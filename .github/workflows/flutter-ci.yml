name: Flutter quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast-fail gate: formatting, static analysis, and the test suite. Runs in
  # parallel with `build-scan` so a broken test surfaces without waiting on the
  # slower APK build.
  analyze-test:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          # Full history so the changed-file format check can diff against the
          # PR base / push predecessor.
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Create non-secret build configuration
        run: cp .env.example .env

      - name: Resolve dependencies
        run: flutter pub get

      - name: Regenerate localization sources
        run: flutter gen-l10n

      - name: Verify generated localization sources are committed
        run: |
          git diff --exit-code -- lib/l10n
          test -z "$(git status --porcelain -- lib/l10n)"

      - name: Verify formatting of changed Dart files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          base_sha="${BASE_SHA:-}"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-parse HEAD^)"
          fi
          mapfile -t dart_files < <(git diff --name-only --diff-filter=ACMR "$base_sha" HEAD -- '*.dart')
          if [[ "${#dart_files[@]}" -gt 0 ]]; then
            dart format --output=none --set-exit-if-changed "${dart_files[@]}"
          fi

      - name: Analyze
        run: flutter analyze

      - name: Run unit and widget tests
        run: flutter test --reporter expanded

  # Slower path: build the debug APK, then scan the built artifact for source
  # markers and emit dependency/SBOM reports. Independent of analyze-test.
  build-scan:
    name: Build APK and scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          # Full history so `gitleaks git` scans real commit diffs. On a shallow
          # (depth-1) clone gitleaks treats the whole tree as one new commit and
          # false-positives on existing content.
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Create non-secret build configuration
        run: cp .env.example .env

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      # Prebuilt release binary instead of `go install` (which recompiles
      # gitleaks from source on every run).
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/gitleaks-bin"
          mkdir -p "$dest"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$dest" gitleaks
          echo "$dest" >> "$GITHUB_PATH"

      - name: Scan mobile source markers and generate dependency report
        env:
          MOBILE_REQUIRE_GITLEAKS: "1"
        run: >-
          bash scripts/check-mobile-secrets.sh
          build/app/outputs/flutter-apk/app-debug.apk

      - name: Generate source SBOM
        uses: anchore/sbom-action@d8a2c0130026bf585de5c176ab8f7ce62d75bf04 # v0.20.7
        with:
          path: .
          format: spdx-json
          output-file: build/security/deutschtiger.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dart-dependencies-${{ github.run_id }}
          path: build/security/dart-dependencies.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deutschtiger-sbom-${{ github.run_id }}
          path: build/security/deutschtiger.spdx.json
          if-no-files-found: warn
          retention-days: 14

  android-integration:
    name: Android welcome integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Slowest job (software-emulated Android). Run it only where it adds a gate:
    # pull requests. Direct push/merge to main skips it — run it locally with
    # `scripts/flutter-integration-local.sh` against a connected device instead.
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Create non-secret integration configuration
        run: cp .env.example .env

      - name: Resolve dependencies
        run: flutter pub get

      # Grant access to /dev/kvm so the x86_64 emulator boots with hardware
      # acceleration. Without this the runner falls back to `-accel off`
      # (software emulation): boot alone took ~7 min and the whole job ~22 min.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Reuse a prebuilt AVD + boot snapshot across runs to skip system-image
      # download and cold boot.
      - name: AVD cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api35-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@324029e2f414c084d8b15ba075288885e74aef9c # v2.34.0
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run welcome integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@324029e2f414c084d8b15ba075288885e74aef9c # v2.34.0
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: >-
            flutter test integration_test/welcome_flow_test.dart
            -d emulator-5554 -r compact
